services:
  mysql:
    image: mysql:5.7
    restart: "no"
    mem_limit: 512m
    memswap_limit: 1g
    cpus: 0.5
    ulimits:
      nproc: 256
      nofile:
        soft: 1024
        hard: 1024
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: sqli_db
    tmpfs:
      - /var/lib/mysql:rw,size=256m
      - /tmp:rw,size=64m
      - /var/run/mysqld:rw,size=32m
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-prootpass"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    labels:
      - "mlai-lab-vulnerability=true"

  web:
    image: python:3.9-slim
    restart: "no"
    mem_limit: 512m
    memswap_limit: 1g
    cpus: 0.5
    ulimits:
      nproc: 128
      nofile:
        soft: 1024
        hard: 1024
    tmpfs:
      - /tmp:rw,size=64m
    ports:
      - "${HOST_PORT}:5000"
    volumes:
      - ./app.py:/app/app.py:ro
      - ./templates:/app/templates:ro
    working_dir: /app
    command: >
      bash -c "pip install flask pymysql &&
               python app.py"
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    labels:
      - "mlai-lab-vulnerability=true"

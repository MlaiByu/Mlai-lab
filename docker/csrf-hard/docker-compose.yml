services:
  web:
    image: php:7.4-apache
    restart: "no"
    mem_limit: 512m
    memswap_limit: 1g
    cpus: 0.5
    ulimits:
      nproc: 128
      nofile:
        soft: 1024
        hard: 1024
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:rw,size=64m,uid=33,gid=33
      - /var/run/apache2:rw,size=64m,uid=33,gid=33
      - /var/log/apache2:rw,size=32m,uid=33,gid=33
      - /usr/src/php:rw,size=128m
    ports:
      - "${HOST_PORT}:80"
    volumes:
      - ./www:/var/www/html:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      - "mlai-lab-vulnerability=true"
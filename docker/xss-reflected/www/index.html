<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>反射型 XSS</title>
    <style>
        body {
            font-family: monospace;
            background: #1a1a2e;
            color: #fff;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #16213e;
            padding: 30px;
            border-radius: 10px;
            border: 1px solid #0f3460;
        }
        h1 {
            color: #00ff88;
            border-bottom: 1px solid #0f3460;
            padding-bottom: 10px;
        }
        input[type="text"] {
            width: 70%;
            padding: 10px;
            background: #0d1117;
            border: 1px solid #0f3460;
            border-radius: 5px;
            color: #fff;
            font-family: monospace;
        }
        button {
            padding: 10px 20px;
            background: #00ff88;
            border: none;
            border-radius: 5px;
            color: #1a1a2e;
            font-weight: bold;
            cursor: pointer;
        }
        .result {
            background: rgba(0, 255, 136, 0.1);
            padding: 15px;
            border-radius: 5px;
            margin-top: 20px;
        }
        .hint {
            background: rgba(255, 255, 0, 0.1);
            padding: 10px;
            border-radius: 5px;
            margin-top: 15px;
            color: #ffc107;
        }
        .flag-box {
            background: rgba(0, 255, 136, 0.05);
            border: 1px dashed #00ff88;
            padding: 10px;
            border-radius: 5px;
            margin-top: 10px;
            font-family: monospace;
            font-size: 12px;
        }
        code {
            background: #0d1117;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>反射型 XSS 实验</h1>
        <form method="GET">
            输入搜索内容：<input type="text" name="xss" id="input" placeholder="尝试输入 JavaScript 代码">
            <button type="submit">搜索</button>
        </form>
        <hr>
        <div class="result" id="result">
            在此显示搜索结果...
        </div>

        <div class="hint">
            <strong>提示：</strong>浏览器会阻止直接的 &lt;script&gt; 标签执行<br>
            <strong>正确方法：</strong>使用事件处理属性注入<br>
            <code>&lt;img src=x onerror=alert(flag)&gt;</code>
        </div>
        
        <div class="flag-box">
            <strong>提示：</strong>页面中有一个全局变量 flag，尝试用 XSS 获取它！
        </div>
    </div>

    <script>
        window.flag = "Mlai{xss_reflected_flag}";
        console.log("Flag:", window.flag);

        function getUrlParam(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }

        const xssParam = getUrlParam('xss');
        if (xssParam) {
            document.getElementById('result').innerHTML = "你输入的内容：" + xssParam;
            document.getElementById('input').value = xssParam;
        }
    </script>
</body>
</html>

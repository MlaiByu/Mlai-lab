services:
  mysql:
    image: mysql:5.7
    restart: "no"
    mem_limit: 512m
    memswap_limit: 768m
    cpus: 0.5
    ulimits:
      nproc: 256
      nofile:
        soft: 1024
        hard: 1024
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: sqli_db
      MYSQL_INITDB_SKIP_TZINFO: "1"
      MYSQL_TCP_PORT: 3306
    tmpfs:
      - /var/lib/mysql:rw,size=256m
      - /tmp:rw,size=64m
      - /var/run/mysqld:rw,size=32m
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-prootpass"]
      interval: 2s
      timeout: 2s
      retries: 10
      start_period: 10s
    labels:
      - "mlai-lab-vulnerability=true"
    networks:
      - mlai-network

  web:
    image: php:7.4-apache
    restart: "no"
    mem_limit: 256m
    memswap_limit: 384m
    cpus: 0.3
    ulimits:
      nproc: 64
      nofile:
        soft: 512
        hard: 512
    tmpfs:
      - /tmp:rw,size=32m,uid=33,gid=33
      - /var/run/apache2:rw,size=16m,uid=33,gid=33
    ports:
      - "${HOST_PORT}:80"
    volumes:
      - ./www:/var/www/html:ro
    command: >
      bash -c "docker-php-ext-install mysqli 2>/dev/null || true && apache2-foreground"
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/ || exit 1"]
      interval: 1s
      timeout: 1s
      retries: 3
      start_period: 2s
    labels:
      - "mlai-lab-vulnerability=true"
    networks:
      - mlai-network

networks:
  mlai-network:
    driver: bridge
    name: "${COMPOSE_PROJECT_NAME}-network"
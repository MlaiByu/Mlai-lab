services:
  web:
    image: php:7.4-apache
    restart: "no"
    mem_limit: 512m
    memswap_limit: 1g
    cpus: 0.5
    ulimits:
      nproc: 128
      nofile:
        soft: 1024
        hard: 1024
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:rw,size=128m,uid=33,gid=33
      - /var/run/apache2:rw,size=64m,uid=33,gid=33
      - /var/log/apache2:rw,size=32m,uid=33,gid=33
    ports:
      - "${HOST_PORT}:80"
    volumes:
      - ./www:/var/www/html:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/ || exit 1"]
      interval: 1s
      timeout: 1s
      retries: 3
      start_period: 2s
    labels:
      - "mlai-lab-vulnerability=true"

services:
  web:
    image: nginx:alpine
    restart: "no"
    mem_limit: 512m
    memswap_limit: 1g
    cpus: 0.5
    ulimits:
      nproc: 128
      nofile:
        soft: 1024
        hard: 1024
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:rw,size=64m,uid=101,gid=101
      - /var/cache/nginx:rw,size=64m,uid=101,gid=101
      - /var/run:rw,size=32m,uid=101,gid=101
    ports:
      - "${HOST_PORT}:80"
    volumes:
      - ./www:/usr/share/nginx/html:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ || exit 1"]
      interval: 1s
      timeout: 1s
      retries: 3
      start_period: 2s
    labels:
      - "mlai-lab-vulnerability=true"